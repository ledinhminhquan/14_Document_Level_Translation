name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install core (no torch) + dev
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Compile
        run: python -m compileall -q src/doctrans
      - name: Test (offline, CPU-only)
        env:
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
          MPLBACKEND: "Agg"
        run: pytest -q
